server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://aws-0-eu-west-3.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0&tcpKeepAlive=true&reWriteBatchedInserts=true}
    username: ${DATABASE_USERNAME:postgres.ixearqeexcceoqscyanx}
    password: ${DATABASE_PASSWORD:CargoLink@0101}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 1800000
      keepalive-time: 60000
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    clean-disabled: false
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true
    locations: classpath:db/migration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@cargolink.ma}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  seed:
    enabled: false
  jwt:
    # FIX BS-05: No hardcoded default — fails fast on missing config.
    secret: ${APP_JWT_SECRET:CargoLinkDevSecretKey2026AtLeast32Chars!}
    # Increase dev token lifetime to reduce unexpected expirations during local development
    expiration: 604800000 # 7d
    refresh-expiration: 1209600000 # 14d
  dev:
    # When true, local testing can pass JWT as ?access_token=... in the browser URL.
    allow-query-token: true
  frontend:
    url: http://localhost:3000
  cors:
    allowed-origin-patterns: "http://localhost:3000,http://localhost:5173"

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.authentication: DEBUG
    org.springframework.security.web.access: DEBUG
    com.deliveryplatform: DEBUG
    com.deliveryplatform.security: DEBUG
