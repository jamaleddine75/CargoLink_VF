spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never # Do not run data.sql since tables are created after data initialization tries to run.
  flyway:
    enabled: false # Disable Flyway for tests to avoid schema mismatch with H2
  mail:
    host: localhost
    port: 25

