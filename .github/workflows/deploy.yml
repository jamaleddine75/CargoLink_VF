name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── Uncomment one of these deploy targets ──────────────────────────────

      # Vercel:
      # - name: Deploy to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     vercel-args: '--prod'
      #     working-directory: frontend

      # Netlify:
      # - name: Deploy to Netlify
      #   uses: netlify/actions/cli@master
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      #   with:
      #     args: deploy --prod --dir=dist

      - name: Confirm frontend build
        run: echo "✅ Frontend build complete — wire deploy target above"

  # ── Backend ─────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - run: chmod +x mvnw

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -q
        env:
          SPRING_PROFILES_ACTIVE: prod

      # ── Uncomment one of these deploy targets ──────────────────────────────

      # Railway:
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      #   with:
      #     service: cargolink-backend

      # Docker + any container registry:
      # - name: Build Docker image
      #   run: |
      #     docker build -t cargolink-backend:${{ github.sha }} .
      #     docker push ${{ secrets.REGISTRY }}/cargolink-backend:${{ github.sha }}

      - name: Confirm backend build
        run: echo "✅ Backend JAR built — wire deploy target above"
