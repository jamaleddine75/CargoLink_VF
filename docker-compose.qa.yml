version: '3.8'

services:
  postgres_qa:
    image: postgres:15-alpine
    container_name: cargolink_postgres_qa
    env_file:
      - .env.qa
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - qa_network

  backend_qa:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cargolink_backend_qa
    env_file:
      - .env.qa
    ports:
      - "8080:8080"
    depends_on:
      postgres_qa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - qa_network

  frontend_qa:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cargolink_frontend_qa
    env_file:
      - .env.qa
    ports:
      - "3000:3000"
    depends_on:
      backend_qa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - qa_network

networks:
  qa_network:
    driver: bridge
